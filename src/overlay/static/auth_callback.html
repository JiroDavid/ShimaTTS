<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShimaTTS - Twitch Login</title>
  <style>
    body {
      background: #fdf3e2;
      color: #4a3526;
      font-family: 'Nunito', 'Trebuchet MS', 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      background: #fffdf8;
      border: 1.5px solid #f2dfc3;
      border-radius: 22px;
      box-shadow: 0 5px 16px rgba(173, 122, 66, 0.12);
      padding: 40px 48px;
      max-width: 420px;
    }
    h2 { color: #d3731f; margin-bottom: 10px; font-family: 'Baloo 2', 'Comic Sans MS', 'Trebuchet MS', sans-serif; }
    p  { color: #8c715a; font-size: 14px; font-weight: 600; }
    .success { color: #3d8a52; }
    .error   { color: #c05242; }
  </style>
</head>
<body>
  <div class="box">
    <h2 id="title">Connecting...</h2>
    <p id="message">Please wait.</p>
  </div>
  <script>
    const hash = window.location.hash.substring(1);
    const params = Object.fromEntries(new URLSearchParams(hash));
    const token = params['access_token'];
    // Twitch's implicit grant echoes state in the fragment, not the query string
    const clientId = params['state'] || '';

    if (!token) {
      document.getElementById('title').textContent = 'Login failed';
      document.getElementById('title').className = 'error';
      document.getElementById('message').textContent = 'No token received from Twitch.';
    } else {
      fetch('/auth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, client_id: clientId }),
      })
      .then(res => {
        if (res.ok) {
          document.getElementById('title').textContent = 'Connected!';
          document.getElementById('title').className = 'success';
          document.getElementById('message').textContent = 'You can close this tab and head back to ShimaTTS.';
        } else {
          throw new Error('Save failed');
        }
      })
      .catch(() => {
        document.getElementById('title').textContent = 'Error';
        document.getElementById('title').className = 'error';
        document.getElementById('message').textContent = 'Could not save token. Is ShimaTTS still running?';
      });
    }
  </script>
</body>
</html>
