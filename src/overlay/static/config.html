<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShimaTTS Config</title>
  <link rel="stylesheet" href="/static/config.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/static/logo.svg" alt="ShimaTTS" width="56">
      <div>
        <h1>ShimaTTS</h1>
        <p class="tagline">Local Twitch TTS alerts</p>
      </div>
    </div>

    <div id="status" class="status hidden"></div>

    <form id="config-form">
      <input type="hidden" name="twitch_token" id="twitch_token_hidden">

      <section>
        <h2>Twitch</h2>
        <label>
          Client ID
          <a href="https://dev.twitch.tv/console/apps" target="_blank" rel="noopener">(register app)</a>
        </label>
        <input type="text" name="twitch_client_id" placeholder="your app client_id">

        <div id="login-status" class="login-status not-connected">Not connected</div>
        <button type="button" id="login-btn" class="login-btn">Login with Twitch</button>

        <label>Channel Name <span class="auto-label" id="channel-auto-label">(auto-filled after login)</span></label>
        <input type="text" name="channel_name" placeholder="your_username">

        <label>Channel Point Reward Name (exact)</label>
        <input type="text" name="reward_name" placeholder="TTS">
      </section>

      <section>
        <h2>Voice</h2>
        <label>Voice Sample (WAV or MP3, 10-30 seconds)</label>
        <div class="file-row">
          <input type="text" name="voice_sample" id="voice_path" placeholder="C:\Users\you\voice_sample.wav">
          <label class="file-pick-btn" for="voice_pick">Browse</label>
          <input type="file" id="voice_pick" accept=".wav,.mp3">
        </div>
        <label>Voice Sample Transcript <span class="auto-label">(what is said in the sample - improves quality)</span></label>
        <input type="text" name="voice_sample_text" placeholder="Exact words spoken in the voice sample">
      </section>

      <section>
        <h2>Overlay</h2>
        <label>Alert GIF</label>
        <div class="file-row">
          <input type="text" name="overlay_gif" id="gif_path" placeholder="C:\Users\you\shima.gif">
          <label class="file-pick-btn" for="gif_pick">Browse</label>
          <input type="file" id="gif_pick" accept=".gif">
        </div>
      </section>

      <section>
        <h2>Settings</h2>
        <label>Max Message Length</label>
        <input type="number" name="max_message_length" value="200" min="10" max="500">

        <label>Port</label>
        <input type="number" name="port" value="7878">
      </section>

      <button type="submit" id="save-btn">Save &amp; Start</button>
    </form>
  </div>

  <div id="saved-banner" class="saved-banner hidden">
    <span>&#10003;</span> ShimaTTS is running - close this tab and go stream!
  </div>

  <script src="/static/config.js"></script>
</body>
</html>
