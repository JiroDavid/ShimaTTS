name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        uses: AnimMouse/setup-ffmpeg@ae28d57dabbb148eff63170b6bf7f2b60062cbae  # v1

      - name: Install PyTorch with CUDA
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu121

      - name: Install f5-tts (inference deps only, skip gradio/wandb/datasets/etc)
        run: pip install f5-tts --no-deps

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: python build.py

      - name: Show dist folder size
        run: |
          $distSize = (Get-ChildItem -Recurse dist\ShimaTTS | Measure-Object -Property Length -Sum).Sum
          Write-Host "dist/ShimaTTS uncompressed: $([math]::Round($distSize / 1MB, 1)) MB"
          Write-Host "--- largest files ---"
          Get-ChildItem -Recurse dist\ShimaTTS | Sort-Object Length -Descending | Select-Object -First 20 |
            ForEach-Object { Write-Host "$([math]::Round($_.Length / 1MB, 1)) MB  $($_.FullName.Replace((Get-Location).Path + '\dist\ShimaTTS\', ''))" }

      - name: Zip dist folder
        run: Compress-Archive -Path dist\ShimaTTS -DestinationPath ShimaTTS.zip

      - name: Show zip size
        run: |
          $size = (Get-Item ShimaTTS.zip).Length
          Write-Host "ShimaTTS.zip size: $([math]::Round($size / 1MB, 1)) MB"
          if ($size -gt 2048MB) { Write-Error "File exceeds GitHub 2 GB upload limit — trim the bundle"; exit 1 }

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "Deleting existing release if any..."
          gh release delete "$env:TAG" --yes --repo "$env:REPO" 2>&1 | Write-Host
          $LASTEXITCODE = 0

          Write-Host "Creating release $env:TAG ..."
          gh release create "$env:TAG" --title "$env:TAG" --notes "" --repo "$env:REPO" 2>&1 | Write-Host
          if ($LASTEXITCODE -ne 0) { Write-Error "gh release create failed"; exit 1 }

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "Uploading ShimaTTS.zip to release $env:TAG ..."
          gh release upload "$env:TAG" ShimaTTS.zip --clobber --repo "$env:REPO" 2>&1 | Write-Host
          if ($LASTEXITCODE -ne 0) { Write-Error "gh release upload failed"; exit 1 }
