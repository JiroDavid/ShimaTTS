name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        uses: AnimMouse/setup-ffmpeg@ae28d57dabbb148eff63170b6bf7f2b60062cbae  # v1

      - name: Install PyTorch with CUDA
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu121

      - name: Install f5-tts (inference deps only, skip gradio/wandb/datasets/etc)
        run: pip install f5-tts --no-deps

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: python build.py

      - name: Zip dist folder
        run: Compress-Archive -Path dist\ShimaTTS -DestinationPath ShimaTTS.zip

      - name: Show zip size
        run: |
          $size = (Get-Item ShimaTTS.zip).Length
          Write-Host "ShimaTTS.zip size: $([math]::Round($size / 1MB, 1)) MB"
          if ($size -gt 2GB) { Write-Warning "File exceeds GitHub 2 GB upload limit!" }

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release delete "$env:TAG" --yes --repo "$env:REPO" 2>$null
          gh release create "$env:TAG" ShimaTTS.zip `
            --title "$env:TAG" `
            --generate-notes `
            --repo "$env:REPO"
